<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | HavenCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--beige) 0%, var(--cream) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: var(--ww);
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(138, 173, 143, 0.15);
            color: var(--sage-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
            animation: popIn 0.5s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .success-sub {
            color: var(--mid);
            font-size: 1.05rem;
            margin-bottom: 32px;
        }

        .order-details {
            background: var(--cream);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: left;
            margin-bottom: 32px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
            font-weight: 600;
            color: var(--dark);
        }

        .detail-label {
            color: var(--mid);
        }

        .detail-value {
            color: var(--dark);
            font-weight: 500;
        }

        .est-delivery {
            font-size: 0.85rem;
            color: var(--sage-dark);
            background: rgba(138, 173, 143, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .btn-home {
            display: inline-flex;
            width: 100%;
            padding: 16px;
            font-size: 1.05rem;
            background: linear-gradient(135deg, var(--sage), var(--saged));
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(94, 131, 99, 0.35);
        }

        @media (max-width: 600px) {
            .success-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>Order Placed Successfully!</h1>
        <p class="success-sub">Thank you for shopping with HavenCraft. Your order is being processed.</p>
        
        <div id="estDelivery" class="est-delivery"></div>

        <div class="order-details" id="orderDetailsBlock">
            <!-- details populated via JS -->
        </div>

        <a href="home.html" class="btn-home">Continue Shopping</a>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="auth.js"></script>
    <script>
        function formatPrice(num) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(num);
        }

        function initSuccess() {
            try {
                const orderData = localStorage.getItem('hc_current_order');
                if (!orderData) {
                    window.location.replace('home.html');
                    return;
                }

                const order = JSON.parse(orderData);
                
                // Display Details
                const block = document.getElementById('orderDetailsBlock');
                block.innerHTML = `
                    <div class="detail-row">
                        <span class="detail-label">Order ID</span>
                        <span class="detail-value">${order.orderId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Deliver To</span>
                        <span class="detail-value">${order.deliveryDetails.fullName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Method</span>
                        <span class="detail-value">${order.paymentMethod === 'Card' ? 'Credit/Debit Card' : order.paymentMethod}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Items</span>
                        <span class="detail-value">${order.items.reduce((sum, item) => sum + (item.qty || 1), 0)} items</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total Amount</span>
                        <span class="detail-value">${formatPrice(order.totalAmount)}</span>
                    </div>
                `;

                // Calculate Est. Delivery (Order Date + 3-5 days)
                const d = new Date(order.orderDate);
                const minDel = new Date(d);
                minDel.setDate(minDel.getDate() + 3);
                const maxDel = new Date(d);
                maxDel.setDate(maxDel.getDate() + 5);
                
                const formatOpts = { month: 'short', day: 'numeric' };
                document.getElementById('estDelivery').textContent = 
                    `🚚 Estimated Delivery: ${minDel.toLocaleDateString('en-IN', formatOpts)} - ${maxDel.toLocaleDateString('en-IN', formatOpts)}`;

            } catch(e) {
                console.error('Error parsing order data', e);
                window.location.replace('home.html');
            }
        }

        document.addEventListener('DOMContentLoaded', initSuccess);
    </script>
</body>
</html>
